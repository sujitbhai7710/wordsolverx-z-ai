name: Publish Pages

run-name: Publish Pages (${{ github.event.client_payload.group || github.event.inputs.group || ((github.event_name == 'push' || github.event_name == 'schedule') && 'site') || 'manual' }}${{ (github.event.client_payload.target_date || github.event.inputs.target_date) && format(' {0}', github.event.client_payload.target_date || github.event.inputs.target_date) || '' }})

on:
  push:
    branches:
      - main
  schedule:
    # Run after the 16:30 UTC main-game rollover used by prerendered "today" pages.
    - cron: '35 16 * * *'
  repository_dispatch:
    types:
      - pages-publish-requested
  workflow_dispatch:
    inputs:
      group:
        description: What to publish
        required: false
        default: site
        type: choice
        options:
          - site
          - main
          - waffle
          - gamedle
      target_date:
        description: Optional target date in YYYY-MM-DD format for worker-style publishes
        required: false
        type: string
      source:
        description: Optional trigger source label
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      group: pages-publish-${{ github.event.client_payload.group || github.event.inputs.group || ((github.event_name == 'push' || github.event_name == 'schedule') && 'site') || 'manual' }}-${{ github.event.client_payload.target_date || github.event.inputs.target_date || github.sha || github.run_id }}
      cancel-in-progress: false
    env:
      GROUP_NAME: ${{ github.event.client_payload.group || github.event.inputs.group || ((github.event_name == 'push' || github.event_name == 'schedule') && 'site') || 'manual' }}
      TARGET_DATE: ${{ github.event.client_payload.target_date || github.event.inputs.target_date || '' }}
      SOURCE_NAME: ${{ github.event.client_payload.source || github.event.inputs.source || (github.event_name == 'push' && format('push:{0}', github.ref_name)) || github.event.action || 'manual' }}
      PREVIEW_BASE_URL: https://wordsolverx-svelte.pages.dev
      PUBLIC_BASE_URL: https://wordsolver.tech
      INDEXING_ARTIFACT_DIR: artifacts/indexing
      SITEMAP_URL: https://wordsolver.tech/sitemap.xml
      GOOGLE_INSPECTION_DELAY_SECONDS: 120
      GOOGLE_INSPECTION_LIMIT: 30
      HAS_INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY != '' }}
      HAS_GOOGLE_SEARCH_CONSOLE: ${{ secrets.GOOGLE_SEARCH_CONSOLE_CREDENTIALS != '' && secrets.GOOGLE_SEARCH_CONSOLE_SERVICE_ACCOUNT != '' && secrets.GOOGLE_SEARCH_CONSOLE_SITE_URL != '' }}
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve Canary Path
        id: canary_path
        shell: bash
        run: |
          case "$GROUP_NAME" in
            site) echo "path=" >> "$GITHUB_OUTPUT" ;;
            main) echo "path=/wordle-answer-today" >> "$GITHUB_OUTPUT" ;;
            waffle) echo "path=/waffle-answer-today" >> "$GITHUB_OUTPUT" ;;
            gamedle) echo "path=/narutodle-answer-today" >> "$GITHUB_OUTPUT" ;;
            *) echo "path=" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Skip If Canary Already Current
        id: canary
        if: env.GROUP_NAME != 'gamedle' && env.TARGET_DATE != '' && steps.canary_path.outputs.path != ''
        env:
          CANARY_PATH: ${{ steps.canary_path.outputs.path }}
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const targetDate = process.env.TARGET_DATE;
          const canaryPath = process.env.CANARY_PATH;
          const outputPath = process.env.GITHUB_OUTPUT;
          const baseUrls = [
            process.env.PREVIEW_BASE_URL,
            process.env.PUBLIC_BASE_URL
          ].filter(Boolean);

          function formatDisplayDate(dateKey) {
            const date = new Date(`${dateKey}T12:00:00Z`);
            return date.toLocaleDateString('en-US', {
              year: 'numeric',
              month: 'long',
              day: 'numeric',
              timeZone: 'UTC'
            });
          }

          function stripHtml(text) {
            return text.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
          }

          async function canaryShowsDate(baseUrl) {
            const response = await fetch(`${baseUrl}${canaryPath}`, {
              headers: { 'User-Agent': 'WordSolverX GitHub Pages Publisher' }
            });

            if (!response.ok) {
              return { ok: false, current: false, baseUrl, status: response.status };
            }

            const html = await response.text();
            const title = stripHtml(html.match(/<title[^>]*>([\s\S]*?)<\/title>/i)?.[1] ?? '');
            const h1 = stripHtml(html.match(/<h1[^>]*>([\s\S]*?)<\/h1>/i)?.[1] ?? '');
            const displayDate = formatDisplayDate(targetDate);
            const current = title.includes(displayDate) || h1.includes(displayDate);

            return { ok: true, current, baseUrl };
          }

          async function main() {
            for (const baseUrl of baseUrls) {
              try {
                const result = await canaryShowsDate(baseUrl);
                if (result.current) {
                  fs.appendFileSync(outputPath, `skip=true\nbase_url=${result.baseUrl}\n`);
                  console.log(`Canary already current at ${result.baseUrl}`);
                  return;
                }
              } catch (error) {
                console.warn(`Canary check failed for ${baseUrl}: ${error instanceof Error ? error.message : String(error)}`);
              }
            }

            fs.appendFileSync(outputPath, 'skip=false\n');
            console.log('Canary still stale; proceeding with deploy.');
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Stop Duplicate Publish
        if: steps.canary.outputs.skip == 'true'
        run: |
          echo "Canary already shows $TARGET_DATE at ${{ steps.canary.outputs.base_url }}. No deploy needed."

      - name: Install Dependencies
        if: steps.canary.outputs.skip != 'true'
        run: npm ci

      - name: Materialize IndexNow Verification Key
        if: steps.canary.outputs.skip != 'true' && env.HAS_INDEXNOW_KEY == 'true'
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        shell: bash
        run: |
          printf '%s' "$INDEXNOW_KEY" > "static/${INDEXNOW_KEY}.txt"

      - name: Deploy Cloudflare Pages
        if: steps.canary.outputs.skip != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy:pages

      - name: Prepare Indexing Targets
        if: steps.canary.outputs.skip != 'true'
        id: indexing_targets
        run: node scripts/seo/prepare-indexing-targets.mjs

      - name: Authenticate Google Search Console
        if: steps.canary.outputs.skip != 'true' && env.HAS_GOOGLE_SEARCH_CONSOLE == 'true'
        id: google_auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GOOGLE_SEARCH_CONSOLE_CREDENTIALS }}
          service_account: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/webmasters

      - name: Submit Updated URLs To IndexNow
        if: steps.canary.outputs.skip != 'true'
        continue-on-error: true
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          INDEXING_TARGETS_PATH: ${{ steps.indexing_targets.outputs.targets_path }}
        run: node scripts/seo/submit-indexnow.mjs

      - name: Submit Sitemap To Google Search Console
        if: steps.canary.outputs.skip != 'true' && steps.google_auth.outputs.access_token != ''
        continue-on-error: true
        env:
          GOOGLE_ACCESS_TOKEN: ${{ steps.google_auth.outputs.access_token }}
          GOOGLE_SEARCH_CONSOLE_SITE_URL: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SITE_URL }}
        run: node scripts/seo/submit-google-sitemap.mjs

      - name: Inspect Priority URLs In Google
        if: steps.canary.outputs.skip != 'true' && steps.google_auth.outputs.access_token != ''
        continue-on-error: true
        env:
          GOOGLE_ACCESS_TOKEN: ${{ steps.google_auth.outputs.access_token }}
          GOOGLE_SEARCH_CONSOLE_SITE_URL: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SITE_URL }}
          INDEXING_TARGETS_PATH: ${{ steps.indexing_targets.outputs.targets_path }}
        run: node scripts/seo/inspect-google-urls.mjs

      - name: Write Indexing Summary
        if: steps.canary.outputs.skip != 'true'
        env:
          INDEXING_TARGETS_PATH: ${{ steps.indexing_targets.outputs.targets_path }}
        run: node scripts/seo/write-indexing-summary.mjs

      - name: Upload Indexing Report
        if: steps.canary.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: indexing-report-${{ github.run_id }}
          path: artifacts/indexing
          if-no-files-found: ignore
