name: Publish Pages

run-name: Publish Pages (${{ github.event_name == 'workflow_dispatch' && github.event.inputs.workflow_mode == 'generate-articles-only' && format('articles {0}', github.event.inputs.article_scope) || github.event.client_payload.group || github.event.inputs.group || ((github.event_name == 'push' || github.event_name == 'schedule') && 'site') || 'manual' }}${{ (github.event.client_payload.target_date || github.event.inputs.target_date) && format(' {0}', github.event.client_payload.target_date || github.event.inputs.target_date) || '' }})

on:
  push:
    branches:
      - main
  schedule:
    # Run after the 16:30 UTC main-game rollover used by prerendered "today" pages.
    - cron: "35 16 * * *"
  repository_dispatch:
    types:
      - pages-publish-requested
  workflow_dispatch:
    inputs:
      workflow_mode:
        description: Run a normal deploy or only generate daily articles
        required: false
        default: deploy
        type: choice
        options:
          - deploy
          - generate-articles-only
      article_scope:
        description: For article-only runs, use the selected group or all current windows
        required: false
        default: all-current-windows
        type: choice
        options:
          - all-current-windows
          - current-group
      group:
        description: What to publish
        required: false
        default: site
        type: choice
        options:
          - site
          - main
          - waffle
          - gamedle
      run_google_inspection:
        description: Run a short Google URL inspection pass after deploy
        required: false
        default: true
        type: boolean
      target_date:
        description: Optional target date in YYYY-MM-DD format for worker-style publishes
        required: false
        type: string
      source:
        description: Optional trigger source label
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    concurrency:
      group: pages-publish-${{ github.ref_name || 'detached' }}-${{ github.event.client_payload.group || github.event.inputs.group || ((github.event_name == 'push' || github.event_name == 'schedule') && 'site') || 'manual' }}-${{ github.event.client_payload.target_date || github.event.inputs.target_date || 'default' }}
      cancel-in-progress: true
    env:
      GROUP_NAME: ${{ github.event.client_payload.group || github.event.inputs.group || ((github.event_name == 'push' || github.event_name == 'schedule') && 'site') || 'manual' }}
      TARGET_DATE: ${{ github.event.client_payload.target_date || github.event.inputs.target_date || '' }}
      WORKFLOW_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.workflow_mode || 'deploy' }}
      ARTICLE_SCOPE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.article_scope || 'disabled' }}
      SOURCE_NAME: ${{ github.event.client_payload.source || github.event.inputs.source || (github.event_name == 'push' && format('push:{0}', github.ref_name)) || github.event.action || 'manual' }}
      PREVIEW_BASE_URL: https://wordsolverx-z-ai.pages.dev
      PUBLIC_BASE_URL: https://wordsolverx.com
      NVIDIA_API_KEYS: ${{ secrets.NVIDIA_API_KEYS }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      AGENT_ROUTER_TOKENS: ${{ secrets.AGENT_ROUTER_TOKENS }}
      AGENT_ROUTER_TOKEN: ${{ secrets.AGENT_ROUTER_TOKEN }}
      ENABLE_DAILY_ARTICLE_GENERATION: ${{ github.event_name == 'repository_dispatch' || github.event_name == 'schedule' }}
      ARTICLE_MAX_CONCURRENCY: 4
      ARTICLE_MAX_ATTEMPTS: 3
      ARTICLE_REQUEST_TIMEOUT_MS: 120000
      ARTICLE_MAX_OUTPUT_TOKENS: 3200
      INDEXING_ARTIFACT_DIR: artifacts/indexing
      INDEXING_REQUEST_TIMEOUT_MS: 10000
      SITEMAP_URL: https://wordsolverx.com/sitemap.xml
      ENABLE_GOOGLE_INSPECTION: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_google_inspection != 'false' }}
      GOOGLE_INSPECTION_STAGGER_MS: 250
      GOOGLE_INSPECTION_CONCURRENCY: 6
      GOOGLE_INSPECTION_REQUEST_TIMEOUT_MS: 10000
      GOOGLE_INSPECTION_LIMIT: 30
      HAS_INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY != '' }}
      HAS_GOOGLE_SEARCH_CONSOLE: ${{ secrets.GOOGLE_SEARCH_CONSOLE_CREDENTIALS != '' && secrets.GOOGLE_SEARCH_CONSOLE_SERVICE_ACCOUNT != '' && secrets.GOOGLE_SEARCH_CONSOLE_SITE_URL != '' }}
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve Canary Path
        id: canary_path
        if: env.WORKFLOW_MODE != 'generate-articles-only'
        shell: bash
        run: |
          case "$GROUP_NAME" in
            site) echo "path=" >> "$GITHUB_OUTPUT" ;;
            main) echo "path=/wordle-answer-today" >> "$GITHUB_OUTPUT" ;;
            waffle) echo "path=/waffle-answer-today" >> "$GITHUB_OUTPUT" ;;
            gamedle) echo "path=/narutodle-answer-today" >> "$GITHUB_OUTPUT" ;;
            *) echo "path=" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Skip If Canary Already Current
        id: canary
        if: env.WORKFLOW_MODE != 'generate-articles-only' && env.GROUP_NAME != 'gamedle' && env.TARGET_DATE != '' && steps.canary_path.outputs.path != ''
        env:
          CANARY_PATH: ${{ steps.canary_path.outputs.path }}
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const targetDate = process.env.TARGET_DATE;
          const canaryPath = process.env.CANARY_PATH;
          const outputPath = process.env.GITHUB_OUTPUT;
          const baseUrls = [
            process.env.PREVIEW_BASE_URL,
            process.env.PUBLIC_BASE_URL
          ].filter(Boolean);

          function formatDisplayDate(dateKey) {
            const date = new Date(`${dateKey}T12:00:00Z`);
            return date.toLocaleDateString('en-US', {
              year: 'numeric',
              month: 'long',
              day: 'numeric',
              timeZone: 'UTC'
            });
          }

          function stripHtml(text) {
            return text.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
          }

          async function canaryShowsDate(baseUrl) {
            const response = await fetch(`${baseUrl}${canaryPath}`, {
              headers: { 'User-Agent': 'WordSolverX GitHub Pages Publisher' }
            });

            if (!response.ok) {
              return { ok: false, current: false, baseUrl, status: response.status };
            }

            const html = await response.text();
            const title = stripHtml(html.match(/<title[^>]*>([\s\S]*?)<\/title>/i)?.[1] ?? '');
            const h1 = stripHtml(html.match(/<h1[^>]*>([\s\S]*?)<\/h1>/i)?.[1] ?? '');
            const displayDate = formatDisplayDate(targetDate);
            const current = title.includes(displayDate) || h1.includes(displayDate);

            return { ok: true, current, baseUrl };
          }

          async function main() {
            for (const baseUrl of baseUrls) {
              try {
                const result = await canaryShowsDate(baseUrl);
                if (result.current) {
                  fs.appendFileSync(outputPath, `skip=true\nbase_url=${result.baseUrl}\n`);
                  console.log(`Canary already current at ${result.baseUrl}`);
                  return;
                }
              } catch (error) {
                console.warn(`Canary check failed for ${baseUrl}: ${error instanceof Error ? error.message : String(error)}`);
              }
            }

            fs.appendFileSync(outputPath, 'skip=false\n');
            console.log('Canary still stale; proceeding with deploy.');
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Stop Duplicate Publish
        if: env.WORKFLOW_MODE != 'generate-articles-only' && steps.canary.outputs.skip == 'true'
        run: |
          echo "Canary already shows $TARGET_DATE at ${{ steps.canary.outputs.base_url }}. No deploy needed."

      - name: Install Dependencies
        if: env.WORKFLOW_MODE == 'generate-articles-only' || steps.canary.outputs.skip != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: Generate Daily Articles Only
        if: env.WORKFLOW_MODE == 'generate-articles-only'
        env:
          ENABLE_DAILY_ARTICLE_GENERATION: true
        shell: bash
        run: |
          npm run data:update

          if [ "$ARTICLE_SCOPE" = "all-current-windows" ]; then
            node scripts/generate-daily-articles-batch.mjs
          else
            node scripts/generate-daily-articles.mjs
          fi

      - name: Upload Generated Article Bundle
        if: env.WORKFLOW_MODE == 'generate-articles-only'
        uses: actions/upload-artifact@v4
        with:
          name: daily-articles-${{ github.run_id }}
          path: |
            src/lib/generated/daily-articles.json
            src/lib/generated/artiples
          if-no-files-found: error

      - name: Materialize IndexNow Verification Key
        if: env.WORKFLOW_MODE != 'generate-articles-only' && steps.canary.outputs.skip != 'true' && env.HAS_INDEXNOW_KEY == 'true'
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        shell: bash
        run: |
          printf '%s' "$INDEXNOW_KEY" > "static/${INDEXNOW_KEY}.txt"

      - name: Deploy Cloudflare Pages
        if: env.WORKFLOW_MODE != 'generate-articles-only' && steps.canary.outputs.skip != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy:pages

      - name: Persist Generated Daily Articles
        if: env.WORKFLOW_MODE != 'generate-articles-only' && steps.canary.outputs.skip != 'true' && (github.event_name == 'repository_dispatch' || github.event_name == 'schedule')
        shell: bash
        run: |
          if git diff --quiet -- src/lib/generated/daily-articles.json src/lib/generated/artiples; then
            echo "No generated article persistence changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/generated/daily-articles.json src/lib/generated/artiples
          git commit -m "chore(articles): persist generated daily article cache"
          git push

      - name: Prepare Indexing Targets
        if: env.WORKFLOW_MODE != 'generate-articles-only' && steps.canary.outputs.skip != 'true'
        id: indexing_targets
        run: node scripts/seo/prepare-indexing-targets.mjs

      - name: Authenticate Google Search Console
        if: env.WORKFLOW_MODE != 'generate-articles-only' && steps.canary.outputs.skip != 'true' && env.HAS_GOOGLE_SEARCH_CONSOLE == 'true'
        id: google_auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GOOGLE_SEARCH_CONSOLE_CREDENTIALS }}
          service_account: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/webmasters

      - name: Run Post-Deploy SEO Requests In Parallel
        if: env.WORKFLOW_MODE != 'generate-articles-only' && steps.canary.outputs.skip != 'true'
        continue-on-error: true
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          GOOGLE_ACCESS_TOKEN: ${{ steps.google_auth.outputs.access_token }}
          GOOGLE_SEARCH_CONSOLE_SITE_URL: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SITE_URL }}
          INDEXING_TARGETS_PATH: ${{ steps.indexing_targets.outputs.targets_path }}
        run: node scripts/seo/run-post-deploy-seo.mjs

      - name: Write Indexing Summary
        if: env.WORKFLOW_MODE != 'generate-articles-only' && steps.canary.outputs.skip != 'true'
        env:
          INDEXING_TARGETS_PATH: ${{ steps.indexing_targets.outputs.targets_path }}
        run: node scripts/seo/write-indexing-summary.mjs

      - name: Upload Indexing Report
        if: env.WORKFLOW_MODE != 'generate-articles-only' && steps.canary.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: indexing-report-${{ github.run_id }}
          path: artifacts/indexing
          if-no-files-found: ignore
